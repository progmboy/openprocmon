name: Release

on:
  # Cut a release by pushing a semver tag, e.g. `git tag v0.1.0 && git push --tags`.
  push:
    tags:
      - "v*"
  # Allow cutting a release manually from the Actions tab for a given tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  # Required for softprops/action-gh-release to create the GitHub Release.
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build GUI + example (release)
        run: cargo build --release -p procmon-gui -p procmon-example

      # Stage the artifacts that actually ship: the GUI app and the console
      # example. (procmon-sdk is a library, nothing to ship standalone.)
      - name: Stage artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}"
          $stage = "dist/openprocmon-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/release/procmon-gui.exe"     -Destination $stage
          Copy-Item "target/release/procmon-example.exe" -Destination $stage
          if (Test-Path "README.md")    { Copy-Item "README.md"    -Destination $stage }
          if (Test-Path "LICENSE")      { Copy-Item "LICENSE"      -Destination $stage }
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/openprocmon-$version-windows-x64.zip" -Force
          # Expose the archive path to later steps.
          "ARTIFACT=dist/openprocmon-$version-windows-x64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: openprocmon-windows-x64
          path: ${{ env.ARTIFACT }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # On workflow_dispatch github.ref isn't the tag, so set it explicitly.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ env.ARTIFACT }}
