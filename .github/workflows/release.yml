name: Release

on:
  # Cut a release by pushing a semver tag, e.g. `git tag v0.1.0 && git push --tags`.
  push:
    tags:
      - "v*"
  # Allow cutting a release manually from the Actions tab for a given tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  # Required for softprops/action-gh-release to create the GitHub Release.
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Fail fast if the release tag doesn't match the shared workspace version, so a
      # mistyped tag (e.g. v0.2.0 while the workspace is still 0.2.1) never produces a
      # mislabeled release. Every shipped crate inherits `[workspace.package] version`,
      # so we assert the tag matches each one — this also catches a crate that has
      # drifted off the workspace version. Uses `cargo metadata` to resolve
      # `version.workspace = true` to the actual version.
      - name: Verify tag matches the workspace version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $tagVersion = $tag -replace '^v', ''
          $meta = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          foreach ($name in 'procmon-gui','procmon-cli','procmon-example') {
            $crateVersion = ($meta.packages | Where-Object { $_.name -eq $name }).version
            if ($tagVersion -ne $crateVersion) {
              Write-Error "Release tag '$tag' (version '$tagVersion') does not match $name version '$crateVersion'. Bump [workspace.package] version in Cargo.toml (every crate must inherit it via version.workspace = true), or fix the tag."
              exit 1
            }
          }
          Write-Host "OK: tag '$tag' matches the workspace version '$tagVersion'."

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build GUI + CLI + example (release)
        run: cargo build --release -p procmon-gui -p procmon-cli -p procmon-example

      # Stage the artifacts that actually ship: the GUI app, the CLI / MCP
      # front-end, and the console example, plus the Claude skill and the MCP
      # usage docs that drive the CLI. (procmon-sdk / procmon-core are libraries,
      # nothing to ship standalone.)
      - name: Stage artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}"
          $stage = "dist/openprocmon-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/release/procmon-gui.exe"     -Destination $stage
          Copy-Item "target/release/procmon-cli.exe"     -Destination $stage
          Copy-Item "target/release/procmon-example.exe" -Destination $stage
          # Bundle the Claude skill so a CLI-driving agent can drop it into
          # ~/.claude/skills, and the MCP guides that document the CLI/MCP server.
          if (Test-Path "skills") { Copy-Item "skills" -Destination $stage -Recurse }
          New-Item -ItemType Directory -Force -Path "$stage/docs" | Out-Null
          foreach ($doc in 'docs/mcp-guide.md','docs/mcp-guide_zh.md') {
            if (Test-Path $doc) { Copy-Item $doc -Destination "$stage/docs" }
          }
          if (Test-Path "README.md")    { Copy-Item "README.md"    -Destination $stage }
          if (Test-Path "LICENSE")      { Copy-Item "LICENSE"      -Destination $stage }
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/openprocmon-$version-windows-x64.zip" -Force
          # Expose the archive path to later steps.
          "ARTIFACT=dist/openprocmon-$version-windows-x64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: openprocmon-windows-x64
          path: ${{ env.ARTIFACT }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # On workflow_dispatch github.ref isn't the tag, so set it explicitly.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ env.ARTIFACT }}
